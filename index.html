<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Duckpond FastDL</title>
  <style>
    body {
      font-family: monospace;
      font-size: 14px;
      padding: 20px;
      color: #000;
      background: #fff;
    }

    h1 {
      font-size: 20px;
      font-weight: normal;
      margin-bottom: 10px;
    }

    hr {
      border: none;
      border-top: 1px solid #999;
      margin: 10px 0;
    }

    pre {
      white-space: pre;
      line-height: 1.5;
    }

    a {
      color: #0000EE;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .name {
      display: inline-block;
      width: 55ch;
    }

    .date {
      display: inline-block;
      width: 22ch;
    }

    .size {
      display: inline-block;
      text-align: right;
      width: 10ch;
    }
  </style>
</head>

<body>

  <h1>Index of Duckpond FastDL</h1>
  <hr>
  <pre>
<span class="name"><a href="maps/">Maps</a></span>
</pre>
  <hr>
</body>

</html>
